name: Build Release APK

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'App to build'
        required: true
        default: driver
        type: choice
        options: [driver, passenger]

jobs:
  build:
    name: Build ${{ inputs.app }} release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create dev.json from secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          mkdir -p packages/flutter-core/env
          cat > packages/flutter-core/env/dev.json << ENDOFFILE
          {
            "SUPABASE_URL": "${SUPABASE_URL}",
            "SUPABASE_ANON_KEY": "${SUPABASE_ANON_KEY}",
            "GOOGLE_MAPS_API_KEY": "${GOOGLE_MAPS_API_KEY}",
            "MP_PUBLIC_KEY": "",
            "SENTRY_DSN": "${SENTRY_DSN}",
            "ENVIRONMENT": "dev"
          }
          ENDOFFILE

      - name: Flutter pub get (flutter-core)
        working-directory: packages/flutter-core
        run: flutter pub get

      - name: Generate code (flutter-core)
        working-directory: packages/flutter-core
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Flutter pub get
        working-directory: apps/${{ inputs.app }}
        run: flutter pub get

      - name: Generate code
        working-directory: apps/${{ inputs.app }}
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Inject Google Maps API key into local.properties
        run: |
          echo "GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}" \
            >> apps/${{ inputs.app }}/android/local.properties

      - name: Set up Android signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        run: |
          APP="${{ inputs.app }}"
          python3 -c "import base64,os,sys; sys.stdout.buffer.write(base64.b64decode(''.join(os.environ['KEYSTORE_BASE64'].split())))" \
            > "apps/$APP/android/app/upload-keystore.jks"
          printf 'storeFile=upload-keystore.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "$KEYSTORE_STORE_PASSWORD" \
            "$KEYSTORE_KEY_ALIAS" \
            "$KEYSTORE_KEY_PASSWORD" \
            > "apps/$APP/android/key.properties"

      - name: Build release APK
        working-directory: apps/${{ inputs.app }}
        run: |
          flutter build apk --release \
            --dart-define-from-file=../../packages/flutter-core/env/dev.json

      - name: Get current version
        id: version
        working-directory: apps/${{ inputs.app }}
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename APK for clarity
        run: |
          APP_NAME="${{ inputs.app }}"
          VERSION="${{ steps.version.outputs.version }}"
          cp "apps/${APP_NAME}/build/app/outputs/flutter-apk/app-release.apk" \
             "apps/${APP_NAME}/build/app/outputs/flutter-apk/${APP_NAME}-v${VERSION}.apk"

      - name: Delete existing release
        run: |
          gh release delete "v${{ steps.version.outputs.version }}-${{ inputs.app }}" \
            --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create new release
        run: |
          APP_NAME="${{ inputs.app }}"
          VERSION="${{ steps.version.outputs.version }}"
          EMOJI="🚗"
          [ "$APP_NAME" = "passenger" ] && EMOJI="🛺"

          gh release create "v${VERSION}-${APP_NAME}" \
            --title "${EMOJI} ${APP_NAME^} App v${VERSION}" \
            --notes "## Instalación

          1. Descargá el APK **${APP_NAME}-v${VERSION}.apk** en tu dispositivo Android
          2. Abrí el archivo — si pide permiso para instalar apps desconocidas, habilitalo
          3. Instalá y probá

          > ⚠️ Si ya tenías una versión anterior instalada y da error, desinstalá la app vieja primero." \
            "apps/${APP_NAME}/build/app/outputs/flutter-apk/${APP_NAME}-v${VERSION}.apk"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
