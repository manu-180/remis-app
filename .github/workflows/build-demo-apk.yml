name: Build Release APK

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'App to build'
        required: true
        default: both
        type: choice
        options: [both, driver, passenger]

jobs:
  build:
    name: Build ${{ matrix.app }} APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(inputs.app == 'both' && '["driver","passenger"]' || format('["{0}"]', inputs.app)) }}

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Validate required secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          missing=()
          [ -z "$SUPABASE_URL" ] && missing+=("SUPABASE_URL")
          [ -z "$SUPABASE_ANON_KEY" ] && missing+=("SUPABASE_ANON_KEY")
          [ -z "$GOOGLE_MAPS_API_KEY" ] && missing+=("GOOGLE_MAPS_API_KEY")
          [ -z "$KEYSTORE_BASE64" ] && missing+=("KEYSTORE_BASE64")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi
          ref=$(echo "$SUPABASE_URL" | sed -E 's|https?://([^.]+)\..*|\1|')
          jwt_ref=$(echo "$SUPABASE_ANON_KEY" | cut -d. -f2 | base64 -d 2>/dev/null | grep -oE '"ref":"[^"]+"' | cut -d'"' -f4 || echo "?")
          echo "::notice::Supabase project ref (from URL): $ref"
          echo "::notice::Supabase project ref (from anon key JWT): $jwt_ref"
          if [ "$ref" != "$jwt_ref" ]; then
            echo "::error::SUPABASE_URL and SUPABASE_ANON_KEY point to different projects (URL=$ref, ANON_KEY=$jwt_ref)."
            exit 1
          fi

      - name: Create dev.json from secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          mkdir -p packages/flutter-core/env
          cat > packages/flutter-core/env/dev.json << ENDOFFILE
          {
            "SUPABASE_URL": "${SUPABASE_URL}",
            "SUPABASE_ANON_KEY": "${SUPABASE_ANON_KEY}",
            "GOOGLE_MAPS_API_KEY": "${GOOGLE_MAPS_API_KEY}",
            "MP_PUBLIC_KEY": "",
            "SENTRY_DSN": "${SENTRY_DSN}",
            "ENVIRONMENT": "dev"
          }
          ENDOFFILE
          # passenger también tiene su propio env/
          mkdir -p apps/passenger/env
          cp packages/flutter-core/env/dev.json apps/passenger/env/dev.json

      - name: Flutter pub get (flutter-core)
        working-directory: packages/flutter-core
        run: flutter pub get

      - name: Generate code (flutter-core)
        working-directory: packages/flutter-core
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Flutter pub get (${{ matrix.app }})
        working-directory: apps/${{ matrix.app }}
        run: flutter pub get

      - name: Generate code (${{ matrix.app }})
        working-directory: apps/${{ matrix.app }}
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Inject Google Maps API key into local.properties
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          # Inject newline-safe e idempotente:
          # - garantiza newline final antes de appender (si flutter pub get dejó el archivo sin \n)
          # - elimina cualquier GOOGLE_MAPS_API_KEY= preexistente para evitar duplicados
          # - usa printf en vez de echo (más portable; sin interpretación de escapes)
          LOCAL_PROPS="apps/${{ matrix.app }}/android/local.properties"
          touch "$LOCAL_PROPS"
          # asegura newline final si el archivo tiene contenido y no termina en \n
          if [ -s "$LOCAL_PROPS" ] && [ "$(tail -c1 "$LOCAL_PROPS" | wc -l)" -eq 0 ]; then
            printf '\n' >> "$LOCAL_PROPS"
          fi
          # remueve líneas previas con la misma key (idempotencia)
          sed -i '/^GOOGLE_MAPS_API_KEY=/d' "$LOCAL_PROPS"
          # appendea la key
          printf 'GOOGLE_MAPS_API_KEY=%s\n' "$GOOGLE_MAPS_API_KEY" >> "$LOCAL_PROPS"
          # verifica que la key quedó escrita (sin revelar el valor)
          KEY_LEN=$(grep '^GOOGLE_MAPS_API_KEY=' "$LOCAL_PROPS" | head -1 | sed 's/^GOOGLE_MAPS_API_KEY=//' | tr -d '\n' | wc -c)
          KEY_COUNT=$(grep -c '^GOOGLE_MAPS_API_KEY=' "$LOCAL_PROPS")
          echo "::notice::local.properties has GOOGLE_MAPS_API_KEY (count=$KEY_COUNT, value length=$KEY_LEN)"
          if [ "$KEY_LEN" -lt 30 ] || [ "$KEY_COUNT" -ne 1 ]; then
            echo "::error::API key injection failed (length=$KEY_LEN, count=$KEY_COUNT). Expected length ~39, count=1."
            exit 1
          fi

      - name: Set up Android signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        run: |
          APP="${{ matrix.app }}"
          python3 -c "import base64,os,sys; sys.stdout.buffer.write(base64.b64decode(''.join(os.environ['KEYSTORE_BASE64'].split())))" \
            > "apps/$APP/android/app/upload-keystore.jks"
          printf 'storeFile=upload-keystore.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "$KEYSTORE_STORE_PASSWORD" \
            "$KEYSTORE_KEY_ALIAS" \
            "$KEYSTORE_KEY_PASSWORD" \
            > "apps/$APP/android/key.properties"

      - name: Print release keystore SHA-1 (for Google Maps API key restriction)
        env:
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
        run: |
          APP="${{ matrix.app }}"
          fp=$(keytool -list -v \
            -keystore "apps/$APP/android/app/upload-keystore.jks" \
            -alias "$KEYSTORE_KEY_ALIAS" \
            -storepass "$KEYSTORE_STORE_PASSWORD" 2>/dev/null \
            | grep -E '^\s*SHA1:' | head -1 | sed -E 's/^\s*SHA1:\s*//')
          if [ -z "$fp" ]; then
            echo "::warning::Could not extract SHA-1 from release keystore"
          else
            echo "::notice::Release keystore SHA-1 (add to Google Maps API key restriction): $fp"
            echo "::notice::Package name: $(grep applicationId apps/$APP/android/app/build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')"
          fi

      - name: Build release APK (${{ matrix.app }})
        working-directory: apps/${{ matrix.app }}
        env:
          # Path primario para inyectar la key al manifest. build.gradle.kts lee
          # esta env var primero y cae a local.properties solo si no está seteada.
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          ENV_FILE="../../packages/flutter-core/env/dev.json"
          [ "${{ matrix.app }}" = "passenger" ] && ENV_FILE="env/dev.json"
          flutter build apk --release --dart-define-from-file="$ENV_FILE"

      - name: Verify API key was embedded in APK manifest
        run: |
          APP="${{ matrix.app }}"
          APK="apps/$APP/build/app/outputs/flutter-apk/app-release.apk"
          # Localizar aapt (cualquier versión de build-tools sirve para dump xmltree)
          AAPT=$(find "$ANDROID_HOME/build-tools" -name aapt 2>/dev/null | sort -V | tail -1)
          if [ -z "$AAPT" ]; then
            echo "::warning::aapt no encontrado, skip verification"
            exit 0
          fi
          # Extraer el value del meta-data com.google.android.geo.API_KEY del manifest del APK
          DUMP=$("$AAPT" dump xmltree "$APK" AndroidManifest.xml 2>/dev/null)
          # Buscar el bloque de meta-data con name=geo.API_KEY y leer el value siguiente
          KEY_VALUE=$(echo "$DUMP" | awk '
            /android:name.*"com\.google\.android\.geo\.API_KEY"/ {found=1; next}
            found && /android:value/ {
              match($0, /Raw: "([^"]*)"/, arr);
              print arr[1]; found=0
            }
          ')
          KEY_LEN=$(printf '%s' "$KEY_VALUE" | wc -c)
          echo "::notice::APK manifest API_KEY length: $KEY_LEN"
          if [ "$KEY_LEN" -lt 30 ]; then
            echo "::error::APK manifest tiene API key vacía o demasiado corta (len=$KEY_LEN). El build no inyectó la key correctamente."
            exit 1
          fi

      - name: Get current version
        id: version
        working-directory: apps/${{ matrix.app }}
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          APP="${{ matrix.app }}"
          VERSION="${{ steps.version.outputs.version }}"
          cp "apps/${APP}/build/app/outputs/flutter-apk/app-release.apk" \
             "apps/${APP}/build/app/outputs/flutter-apk/${APP}-v${VERSION}.apk"

      - name: Delete existing release (if any)
        run: |
          gh release delete "v${{ steps.version.outputs.version }}-${{ matrix.app }}" \
            --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release with APK
        run: |
          APP="${{ matrix.app }}"
          VERSION="${{ steps.version.outputs.version }}"
          EMOJI="🚗"
          [ "$APP" = "passenger" ] && EMOJI="🛺"

          gh release create "v${VERSION}-${APP}" \
            --title "${EMOJI} ${APP^} App v${VERSION}" \
            --notes "## Instalación

          1. Descargá el APK **${APP}-v${VERSION}.apk** en tu dispositivo Android
          2. Abrí el archivo — si pide permiso para instalar apps desconocidas, habilitalo
          3. Instalá y probá

          > ⚠️ Si ya tenías una versión anterior instalada y da error, desinstalá la app vieja primero." \
            "apps/${APP}/build/app/outputs/flutter-apk/${APP}-v${VERSION}.apk"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
