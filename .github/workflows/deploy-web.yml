name: Deploy Web (Vercel)

on:
  push:
    branches: [main, staging]
    paths:
      - 'apps/dispatcher/**'
      - 'apps/web/**'
      - 'packages/**'

jobs:
  deploy-dispatcher:
    name: Deploy dispatcher to Vercel
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Deploy dispatcher
        working-directory: apps/dispatcher
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DISPATCHER }}
        run: |
          npx vercel pull --yes --environment=${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }} \
            --token=${{ secrets.VERCEL_TOKEN }}
          npx vercel build ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} \
            --token=${{ secrets.VERCEL_TOKEN }}
          npx vercel deploy --prebuilt ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} \
            --token=${{ secrets.VERCEL_TOKEN }}

  deploy-web:
    name: Deploy web to Vercel
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Deploy web
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
        run: |
          npx vercel pull --yes --environment=${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }} \
            --token=${{ secrets.VERCEL_TOKEN }}
          npx vercel build ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} \
            --token=${{ secrets.VERCEL_TOKEN }}
          npx vercel deploy --prebuilt ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} \
            --token=${{ secrets.VERCEL_TOKEN }}
