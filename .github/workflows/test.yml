name: Test

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-js:
    name: JS/TS unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: supabase start

      - run: pnpm -r test

  test-flutter:
    name: Flutter tests (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [driver, passenger]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: cd apps/${{ matrix.app }} && flutter pub get && flutter test

  test-e2e:
    name: Playwright E2E (dispatcher)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: cd apps/dispatcher && pnpm playwright install --with-deps chromium

      - run: cd apps/dispatcher && pnpm test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/dispatcher/playwright-report/

  test-pgtap:
    name: pgTAP database tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1

      - run: supabase start

      - run: supabase db test
