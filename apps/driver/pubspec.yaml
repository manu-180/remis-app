name: remis_driver
description: App del conductor de remís
publish_to: none
version: 0.1.0+1

environment:
  sdk: ^3.5.0
  flutter: ^3.27.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.0
  riverpod_annotation: ^2.6.0
  go_router: ^14.6.0
  supabase_flutter: ^2.8.0
  google_maps_flutter: ^2.10.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  device_info_plus: ^11.2.0
  package_info_plus: ^8.1.0
  permission_handler: ^11.3.1
  flutter_background_geolocation: ^4.16.0
  flutter_local_notifications: ^18.0.1
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  disable_battery_optimization: ^1.1.1
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.3
  flutter_animate: ^4.5.0
  audioplayers: ^6.1.0
  battery_plus: ^6.0.3
  sentry_flutter: ^8.13.0
  http: ^1.2.2
  remis_design_system:
    path: ../../packages/design-system/flutter
  remis_flutter_core:
    path: ../../packages/flutter-core

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.0
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  flutter_lints: ^5.0.0
  mocktail: ^0.3.0
  # custom_lint + riverpod_lint: incompatible with Dart 3.10.x / analyzer 7.6 — re-add when upstream fixes
  # custom_lint: ^0.7.0
  # riverpod_lint: ^2.6.0

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/

# Fix: analyzer_plugin 0.12.0 (transitivo via riverpod_generator) usa publiclyExporting2,
# que fue eliminado en analyzer 7.6. Pinear analyzer en 7.4.x mantiene la API y
# es compatible con freezed 2.5 + riverpod_generator.
dependency_overrides:
  analyzer_plugin: ^0.13.0
