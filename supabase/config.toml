# A string used to distinguish different Supabase projects on the same host.
# Defaults to the working directory name when running `supabase init`.
project_id = "remis-pampa"

[api]
enabled = true
# Port to use for the API URL.
port = 54321
# Schemas to expose in your API. Tables, views and stored procedures in this schema will get API endpoints.
# `public` and `graphql_public` schemas are always included.
schemas = ["public", "graphql_public"]
# Extra schemas to add to the search_path of every request. `public` is always included.
extra_search_path = ["public", "extensions"]
# The maximum number of rows returns from a view, table, or stored procedure. Limits payload size
# for accidental or malicious requests.
max_rows = 1000

[api.tls]
enabled = false

[db]
# Port to use for the local database URL.
port = 54322
# Port used by db diff command to initialize the shadow database.
shadow_port = 54320
# The database major version to use. This has to be the same as your remote database's. Run `SHOW
# server_version;` on the remote database to check.
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true
# Bind realtime via either IPv4 or IPv6. (default: IPv6)
ip_version = "IPv6"
# The duration in seconds before a poll-based realtime query is disconnected.
max_header_length = 4096
# Max payload size in KB (para GPS broadcast)
max_payload_size_kb = 1024

[studio]
enabled = true
port = 54323
# External URL of the API server that frontend connects to.
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

# Email testing server. Emails sent with the local dev setup are not actually sent -
# instead, they are monitored, and you can view the emails that would have been sent from the web
# interface.
[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
# The maximum file size allowed (e.g. "5MB", "500KB").
file_size_limit = "50MiB"

[storage.image_transformation]
enabled = true

[auth]
enabled = true
# The base URL of your website. Used as an allow-list for redirects and for constructing URLs used
# in emails.
site_url = "http://127.0.0.1:3000"
# A list of *exact* URLs that auth providers are permitted to redirect to post authentication.
additional_redirect_urls = ["https://127.0.0.1:3000"]
# How long tokens are valid for, in seconds. Defaults to 3600 (1 hour), maximum 604,800 (1 week).
jwt_expiry = 3600
# If disabled, the refresh token will never expire.
enable_refresh_token_rotation = true
# Allows refresh tokens to be reused after expiry, up to the specified interval in seconds.
# Requires enable_refresh_token_rotation = true.
refresh_token_reuse_interval = 10
# Allow/disallow new user signups to your project.
enable_signup = true
# Allow/disallow anonymous sign-ins to your project.
enable_anonymous_sign_ins = false
# Allow/disallow testing manual linking of accounts
enable_manual_linking = false

[auth.email]
# Allow/disallow new user signups via email to your project.
enable_signup = true
# If enabled, a user will be required to confirm any email change on both the old, and new email
# addresses. If disabled, only the new email is required to confirm.
double_confirm_changes = true
# If enabled, users need to confirm their email address before signing in.
# Deshabilitado en dev, habilitado en prod
enable_confirmations = false
# If enabled, users will need to reauthenticate or have logged in recently to change their password.
enable_secure_password_change = false
max_frequency = "1s"
otp_length = 6
otp_expiry = 3600

[auth.sms]
# Allow/disallow new user signups via SMS to your project.
# Habilitado: los conductores se logean por teléfono
enable_signup = true
enable_confirmations = false
template = "Tu código de verificación para Remís Pampa es: {{ .Code }}"
max_frequency = "5s"

[auth.sms.twilio]
enabled = false
account_sid = "env(TWILIO_ACCOUNT_SID)"
message_service_sid = "env(TWILIO_MESSAGE_SERVICE_SID)"
auth_token = "env(TWILIO_AUTH_TOKEN)"

# Use pre-existing secret or configure a new secret.
[auth.jwt]
secret = "super-secret-jwt-token-with-at-least-32-characters-long"
exp = 3600

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.mfa.phone]
enroll_enabled = false
verify_enabled = false
otp_length = 6
template = "Tu código MFA es {{ .Code }}"
max_frequency = "5s"

[auth.rate_limit]
# Number of emails that can be sent per hour. Requires auth.email.enable_signup = true.
email_sent_per_hour = 10
# Number of SMS messages that can be sent per hour. Requires auth.sms.enable_signup = true.
sms_sent_per_hour = 10
# Number of anonymous sign-ins that can be made per hour per IP address.
anonymous_users = 30
# Number of sign-in / sign-ups via password that can be attempted per hour per IP address.
token_refresh_limit = 150
# Number of OTP/magic link verifications that can be attempted per hour per IP address.
verify_limit = 30

[edge_runtime]
enabled = true
# Configure one of the supported request policies: `oneshot`, `per_worker`.
policy = "oneshot"
inspector_port = 8083

[analytics]
enabled = false
port = 54327
# Configure one of the supported backends: `postgres`, `bigquery`.
backend = "postgres"
